version: 1

# Token store for ccai9012.
#
# Put your secrets here locally. Do NOT commit real tokens to git.
# The code will look up these keys first, then fall back to env vars, then ask via a secure prompt.
#
# You can also point to a different file via:
#   export CCAI9012_TOKEN_YAML=/absolute/path/to/token.yaml

# !!NOTE!!: if the token is wrong or deprecated, the get_token function will not recognize it.
# So please make sure your token is right and valid before filling in this file. Otherwise, please leave it blank.

env:
  DEEPSEEK_API_KEY: ""
  HUGGINGFACE_API_KEY: ""
  GOOGLEMAP_API_KEY: ""