name: ccai9012
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip

  - numpy
  - scipy
  - pandas
  - scikit-learn

  - matplotlib
  - seaborn
  - shap
  - statsmodels
  - numba

  - folium
  - geopy

  - graphviz
  - pygraphviz

  # Prefer conda-forge for heavy/binary packages
  - pyarrow
  - spacy
  - lightgbm
  - datasets

  # Jupyter stack
  - jupyter
  - jupyterlab
  - ipywidgets

  - pip:
      # Geo / spatial
      - geopandas>=0.14
      - shapely>=2.0
      - pyproj>=3.6
      - osmnx>=1.9
      - branca>=0.6

      # Deep learning / vision
      - torch>=2.1,<3.0
      - torchvision>=0.16
      - transformers>=4.35
      - diffusers>=0.20
      - opencv-python>=4.8
      - ultralytics>=8.0

      # Hugging Face / LLM utils
      - accelerate
      - sentence-transformers

      # LangChain ecosystem
      - langchain==0.3.14
      - langchain-community>=0.3.14
      - langchain-core>=0.3.29
      - langchain-text-splitters>=0.3.3
      - langchain-openai
      - langchain-deepseek

      # Fairness / bias
      - aif360

      # Notebook / docs helpers
      - jupytext
      - beautifulsoup4
      - rich

      # Media
      - moviepy
      - imageio

      # Utils
      - tqdm
      - requests>=2.28
      - PyYAML>=6.0
      - plotly>=5.18
      - wordcloud>=1.9
      - ipython
      - pytest
      - huggingface_hub>=0.16
      - qwen_vl_utils
